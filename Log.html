<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Library Page</title>
    <link rel="stylesheet" href="style.css">
    <script defer type="text/javascript" src="script.js"></script>
    <script defer type="text/javascript" src="log.js"></script>
</head>
<body>
    <div class="titleBar">
        <h1>Generic Fortune Teller Website</h1>
        <a class="button" href="index.html">Playmat</a>
        <a class="button" href="library.html">Library</a>
        <a class="button active" href="log.html">Log</a>
    </div>
    <br /><hr />

    <p>This page allows you to record your tarot readings and record interpretations. This is stored locally in your browser.</p>
    <div>
        <button type="button" onclick="toggleLogForm()">Toggle Log Entry Form</button>
        &emsp;
        <button type="button" onclick="importLogs()">Import Logs</button>
        <button type="button" onclick="exportLogEntries()">Export Logs</button>
    </div>
    <form onsubmit="submitLogEntry()" id="logEntryForm" style="display: none;">
        <br />
        <label for="logTitleInput">Log Title:</label><br />
        <input type="text" id="logTitleInput" name="logTitleInput" placeholder="Add Title here..." autocomplete="off"><br /><br />

        <label for="logDateInput">Date:</label><br />
        <input type="datetime-local" id="logDateInput" name="logDateInput"><br /><br />
        
        <label for="logCardsInput">Cards:</label><br />
        <ul id="logCardListData" style="list-style: none; padding-left: 0.5rem;">

        </ul>
        <input type="text" onkeyup="handleSuggestionSearchInput()" id="logCardsInput" name="logCardsInput" placeholder="Search a card to add..." autocomplete="off">
        &emsp;
        <input type="button" onclick="addCurrentCardsToLog()" value="Add Current Cards">
        <ul id="logCardSearchResults" style="list-style: none; padding-left: 0.5rem;">

        </ul>
        <br /><br />

        <label for="logInterpretationInput">Interpretation:</label><br />
        <textarea id="logInterpretationInput" name="logInterpretationInput" rows="4" cols="50" placeholder="Enter your interpretation here..."></textarea><br />
        <button type="submit">Submit Log Entry</button>
    </form>
    <br /><br />

    <template>
        <div class="logEntry">
            <button style="float: right;" type="button" onclick="deleteLogEntry(this)">Delete Log</button>
            <h1 class="logTitle">Title</h1>
            <h2 class="logDate subheading">Date</h2>
            <p class="logCards"><b>Cards:</b> <span class="logCardList"></span></p>
            <p class="logInterpretation"><b>Interpretation:</b> <span class="logInterpretationText"></span></p>
        </div>
    </template>

    <div id="logEntriesContainer">

    </div>
</body>
</html>
